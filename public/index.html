<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCP Demo App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .status { color: #0066cc; font-weight: bold; margin-top: 10px; }
        .pod-name { background: #e1e8ed; padding: 5px 10px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome</h1>
        <p>v1.2</p>
        <p>This application running on Openshift Container Platform.</p>
        <div id="content">Loading info...</div>
        <p class="status">Status: Connected</p>
    </div>

    <script>
        fetch('/api/info')
            .then(res => res.json())
            .then(data => {
                document.getElementById('content').innerHTML = `
                    <p>Served by Pod:</p>
                    <span class="pod-name">${data.hostname}</span>
                `;
            });
    </script>
</body>
</html>
